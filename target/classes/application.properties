spring.application.name=blog

# MySQL Connection Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blogdb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
blog.jwt.secret=${BLOG_JWT_SECRET:change-me-in-production-change-me-in-production-32}
blog.jwt.expiration-ms=${BLOG_JWT_EXPIRATION_MS:86400000}
